name: ride_hailing_app
description: A cross-platform ride hailing application like Uber/Bolt built with Flutter for Ghana.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  get: ^4.6.5
  get_storage: ^2.1.1

  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.10.0
  firebase_messaging: ^14.6.0
  cloud_firestore: ^4.13.0

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.2
  geocoding: ^2.1.1

  # Payments
  # stripe_flutter: ^10.1.0

  # UI
  flutter_svg: ^2.0.7
  lottie: ^2.7.0
  intl: ^0.19.0
  pin_code_fields: ^8.0.1

  # Networking
  http: ^1.1.0
  dio: ^5.3.1

  # Utilities
  uuid: ^4.0.0
  flutter_dotenv: ^5.1.0
  permission_handler: ^12.0.1

  pin_code_fields: ^8.0.1
  # firebase_auth: ^4.10.0
  # cloud_firestore: ^4.13.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
